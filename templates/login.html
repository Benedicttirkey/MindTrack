<!doctype html>
{% load static %}
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - MindTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="auth-body">
  <section class="auth-card">
    <div class="auth-intro">
      <span class="eyebrow">Welcome back</span>
      <h1>Sign in to MindTrack</h1>
      <p>Continue tracking your mood, sleep and routine with one clean dashboard.</p>
    </div>

    {% if err_msg %}<div class="alert alert-error">{{ err_msg }}</div>{% endif %}

    <form method="post" action="{% url 'login' %}" class="auth-form">
      {% csrf_token %}
      <div class="field-block">
        <label>Email</label>
        <input type="email" name="email" required value="{{ request.POST.email|default:'' }}" placeholder="student@example.com">
      </div>
      <div class="field-block">
        <label>Password</label>
        <input type="password" name="password" required placeholder="Enter your password">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Login</button>
      <p class="auth-link">No account yet? <a href="{% url 'register' %}">Create one</a></p>
    </form>
  </section>
</body>
</html>
